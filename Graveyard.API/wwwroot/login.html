<!DOCTYPE html>
<html class="light" lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sistem Girişi - Mezarlık Yönetimi</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config = {darkMode:"class",theme:{extend:{colors:{"primary-fixed":"#c8e8d0","on-surface-variant":"#4a4e4a","outline":"#74796e","primary-container":"#78a886","on-surface":"#2e3230","surface-container-lowest":"#ffffff","surface-container-low":"#f5f1ea","outline-variant":"#c4c8bc","primary":"#4a7c59","on-primary":"#ffffff","error":"#b83230","error-container":"#ffdad8","on-error-container":"#690005"}}}};</script>
<style>
  body{font-family:'Inter',sans-serif}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400}
  .icon-fill{font-variation-settings:'FILL' 1,'wght' 400}
  .custom-shadow{box-shadow:0 10px 40px -10px rgba(0,0,0,.15)}
</style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-6 text-on-surface">
<div class="absolute top-5 right-5">
  <button id="langBtn" onclick="toggleLangMenu()" class="flex items-center gap-1 px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-full text-xs font-semibold hover:bg-surface-container-low transition-colors">
    <span class="material-symbols-outlined text-[16px]">translate</span><span id="langCurrent">Türkçe</span>
    <span class="material-symbols-outlined text-[16px]">expand_more</span>
  </button>
  <div id="langMenu" class="hidden absolute right-0 mt-1 w-36 bg-surface-container-lowest border border-outline-variant rounded-lg shadow-lg overflow-hidden z-50">
    <button data-lang-opt="tr" onclick="chooseLang('tr')" class="w-full text-left px-4 py-2.5 text-sm hover:bg-surface-container-low flex items-center gap-2"><img src="https://flagcdn.com/w40/tr.png" alt="TR" class="w-5 h-5 rounded-full object-cover"/>Türkçe</button>
    <button data-lang-opt="en" onclick="chooseLang('en')" class="w-full text-left px-4 py-2.5 text-sm hover:bg-surface-container-low flex items-center gap-2"><img src="https://flagcdn.com/w40/gb.png" alt="EN" class="w-5 h-5 rounded-full object-cover"/>English</button>
  </div>
</div>
<main class="w-full max-w-[440px]">
<div class="bg-surface-container-lowest rounded-2xl border border-outline-variant custom-shadow p-10 flex flex-col items-center">
<div class="w-16 h-16 bg-primary-fixed rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-3xl icon-fill">account_balance</span>
</div>
<div class="text-center mb-8">
<h1 class="text-2xl font-semibold mb-2" data-i18n="login_title">Mezarlık Yönetimi</h1>
<p class="text-sm text-on-surface-variant" data-i18n="login_subtitle">Lütfen yönetici paneline erişmek için giriş yapın.</p>
</div>
<form id="loginForm" class="w-full space-y-4">
<div>
<label class="block text-xs font-semibold tracking-wide text-on-surface-variant mb-2" for="username" data-i18n="username">Kullanıcı Adı</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4"><span class="material-symbols-outlined text-outline">person</span></span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all" id="username" name="username" data-i18n-ph="username_ph" placeholder="Kullanıcı adınızı girin" required type="text" value="admin"/>
</div>
</div>
<div>
<label class="block text-xs font-semibold tracking-wide text-on-surface-variant mb-2" for="password" data-i18n="password">Şifre</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4"><span class="material-symbols-outlined text-outline">lock</span></span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary transition-all" id="password" name="password" placeholder="••••••••" required type="password" value="Admin123!"/>
</div>
</div>
<div id="errorBox" class="hidden bg-error-container text-on-error-container text-sm rounded-lg px-4 py-3"></div>
<div class="pt-2">
<button id="loginBtn" class="w-full bg-primary text-on-primary rounded-full py-3.5 flex items-center justify-center gap-2 hover:opacity-90 transition-all focus:outline-none focus:ring-4 focus:ring-primary-fixed disabled:opacity-60" type="submit">
<span class="text-xs font-semibold uppercase tracking-wider" data-i18n="login_btn">Giriş Yap</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 text-center">
<p class="text-[12px] text-outline"><span data-i18n="login_footer1">Güvenli Belediye Yönetim Sistemi altyapısıdır.</span><br/><span data-i18n="login_footer2">Yetkisiz erişim yasaktır.</span></p>
</div>
</div>
</main>
<script src="i18n.js"></script>
<script>
  if (localStorage.getItem('token')) location.href = 'index.html';
  applyI18n();

  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('errorBox');
  const btn = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.classList.add('hidden');
    btn.disabled = true;
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    try {
      const res = await fetch('/api/Auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (!res.ok) {
        errorBox.textContent = t('login_error');
        errorBox.classList.remove('hidden');
        btn.disabled = false;
        return;
      }
      const data = await res.json();
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username);
      localStorage.setItem('role', data.role);
      location.href = 'index.html';
    } catch (err) {
      errorBox.textContent = t('login_conn_error');
      errorBox.classList.remove('hidden');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
